<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a1f2e;stop-opacity:1" />
    </linearGradient>
    <!-- Neural node glow filter -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)"/>

  <!-- Outer ring – blue arc (top-left) -->
  <path d="M 32 6 A 26 26 0 0 1 58 32" stroke="#4285F4" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Outer ring – red arc (top-right) -->
  <path d="M 58 32 A 26 26 0 0 1 32 58" stroke="#EA4335" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Outer ring – yellow arc (bottom-right) -->
  <path d="M 32 58 A 26 26 0 0 1 6 32" stroke="#FBBC05" stroke-width="5" fill="none" stroke-linecap="round"/>
  <!-- Outer ring – green arc (bottom-left) -->
  <path d="M 6 32 A 26 26 0 0 1 32 6" stroke="#34A853" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Inner neural network nodes -->
  <!-- Center node -->
  <circle cx="32" cy="32" r="3.5" fill="#ffffff" opacity="0.9" filter="url(#glow)"/>

  <!-- Connector lines -->
  <line x1="32" y1="32" x2="22" y2="22" stroke="#4285F4" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="42" y2="22" stroke="#EA4335" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="42" y2="42" stroke="#FBBC05" stroke-width="1.2" opacity="0.7"/>
  <line x1="32" y1="32" x2="22" y2="42" stroke="#34A853" stroke-width="1.2" opacity="0.7"/>

  <!-- Satellite nodes -->
  <circle cx="22" cy="22" r="2.5" fill="#4285F4" opacity="0.85" filter="url(#glow)"/>
  <circle cx="42" cy="22" r="2.5" fill="#EA4335" opacity="0.85" filter="url(#glow)"/>
  <circle cx="42" cy="42" r="2.5" fill="#FBBC05" opacity="0.85" filter="url(#glow)"/>
  <circle cx="22" cy="42" r="2.5" fill="#34A853" opacity="0.85" filter="url(#glow)"/>
</svg>
