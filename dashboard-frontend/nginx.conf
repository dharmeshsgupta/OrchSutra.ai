server {
    # Nginx listens on port 80 inside the container
    listen 80;

    # Serve files from this directory (where React build outputs)
    root /usr/share/nginx/html;
    index index.html;

    # ── LESSON: Why do we need this "try_files" trick? ──
    # React is a Single Page Application (SPA).
    # When a user visits /dashboard or /chat directly,
    # Nginx would look for a file called "dashboard" or "chat"
    # — but those files don't exist on disk!
    # React handles routing in JavaScript.
    # So we tell Nginx: "if file not found, serve index.html"
    # and React's router takes over from there.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API Proxy ──
    # Instead of hardcoding backend URLs in React,
    # we proxy API requests through Nginx.
    # This also avoids CORS issues!

    # Proxy /api/router/* → api-backend (port 3000)
    location /api/router/ {
        proxy_pass http://api-backend:3000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # ↑ These headers pass the real user's IP to your backend
    }

    # Proxy /api/app/* → primary-backend (port 3001)
    location /api/app/ {
        proxy_pass http://primary-backend:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy /api/agent/* → agent-engine (port 3002)
    location /api/agent/ {
        proxy_pass http://agent-engine:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Gzip Compression ──
    # Compresses responses before sending to browser.
    # Makes your app load faster (JS/CSS can shrink 70%+).
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
