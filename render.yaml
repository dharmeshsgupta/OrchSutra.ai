# render.yaml — Render.com deployment config
# Deploy all services at once by connecting this repo on render.com
# Docs: https://render.com/docs/yaml-spec

services:
  # ── primary-backend (FastAPI — auth, models, rankings, chat) ──────────────
  - type: web
    name: orchsutra-primary
    runtime: docker
    dockerfilePath: ./primary-backend/Dockerfile
    dockerContext: ./primary-backend
    plan: free                    # Free: 512MB RAM, sleeps after 15min
    region: singapore             # Closest free region to India
    healthCheckPath: /health
    envVars:
      # Database (use Supabase free PostgreSQL)
      - key: DATABASE_URL
        sync: false               # You'll paste this from Supabase dashboard

      # Firebase (paste from your .env)
      - key: FIREBASE_SERVICE_ACCOUNT_KEY
        sync: false
      - key: FIREBASE_PROJECT_ID
        sync: false

      # App settings
      - key: PORT
        value: "3001"
      - key: ENVIRONMENT
        value: "production"

      # External APIs
      - key: OPENROUTER_MODELS_URL
        value: "https://openrouter.ai/api/v1/models"
      - key: HUGGINGFACE_MODELS_URL
        value: "https://huggingface.co/api/models?sort=downloads&direction=-1&limit=200"

      # Payment keys (optional, add if you use payments)
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false

  # ── api-backend (FastAPI — LLM routing, provider adapters) ───────────────
  - type: web
    name: orchsutra-api
    runtime: docker
    dockerfilePath: ./api-backend/Dockerfile
    dockerContext: ./api-backend
    plan: free
    region: singapore
    healthCheckPath: /health
    envVars:
      # Provider API keys
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: PORT
        value: "3000"
      - key: ENVIRONMENT
        value: "production"

# NOTE: agent-engine is NOT included here because it requires PyTorch
# (~2GB) which exceeds the free tier's 512MB RAM limit.
# To deploy agent-engine: upgrade to Render Starter ($7/mo, 512MB→1GB)
# or use Hugging Face Spaces (free for ML workloads).
